<div class="table-wrap">
  <table>
    <thead><tr><th>Property</th><th>Status</th><th>Price</th><th>City</th><th></th></tr></thead>
    <tbody>
      {% for property in properties %}
        <tr>
          <td>{{ property.title }}</td>
          <td>{{ property.get_status_display }}</td>
          <td>{{ property.price }}</td>
          <td>{{ property.city }}</td>
          <td><a href="{% url 'properties:edit' property.slug %}">Edit</a></td>
        </tr>
      {% empty %}
        <tr><td colspan="5">No properties yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
