{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
  <h1>Create account</h1>
  <form method="post" enctype="multipart/form-data" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create account</button>
  </form>
  <a class="social-login" href="{% url 'social:begin' 'google-oauth2' %}">Continue with Google</a>
</section>
{% endblock %}
