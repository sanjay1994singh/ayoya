{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <p class="eyebrow">Ayoya account</p>
    <h1>Login</h1>
    <a class="social-login" href="{% url 'social:begin' 'google-oauth2' %}">Continue with Google</a>
    <div class="auth-divider"><span>or</span></div>
    <form method="post" class="form-card">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
  </div>
</section>
{% endblock %}
