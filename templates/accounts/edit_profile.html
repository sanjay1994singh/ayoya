{% extends "base.html" %}
{% block content %}
<section class="content-page profile-edit-page">
  <div class="section-head">
    <h1>Edit profile</h1>
    <a class="btn secondary" href="{% url 'dashboard:home' %}">Dashboard</a>
  </div>
  <form method="post" enctype="multipart/form-data" class="profile-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save profile</button>
  </form>
</section>
{% endblock %}
